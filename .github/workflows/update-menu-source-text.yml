name: Update menu source text

on:
  workflow_dispatch:
    inputs:
      mph_current_pdf_url:
        description: "Current MPH PDF URL, if auto-discovery is not available"
        required: false
  schedule:
    - cron: "15 7 * * 1-5"

permissions:
  contents: write

jobs:
  update-source-text:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: node scripts/update-source-text.mjs
        env:
          MPH_CURRENT_PDF_URL: ${{ inputs.mph_current_pdf_url }}
      - run: node scripts/validate-menu.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update menu source text"
